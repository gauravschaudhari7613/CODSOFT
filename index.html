<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe AI Game</title>
    <!-- Basic SEO tags -->
    <meta name="description" content="Play an unbeatable Tic-Tac-Toe game against a Minimax AI.">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Tic-Tac-Toe AI Game</h1>
            <p class="subtitle">Can you beat the AI?</p>

            <div class="game-controls">
                <div class="difficulty-selector">
                    <label for="difficulty">Difficulty:</label>
                    <select id="difficulty">
                        <option value="easy">Easy (Random)</option>
                        <option value="medium" selected>Medium (50% Chance)</option>
                        <option value="hard">Hard (Unbeatable)</option>
                    </select>
                </div>

                <div class="score-board-ui">
                    <div class="score-box">Player (X): <span id="score-player">0</span></div>
                    <div class="score-box">Ties: <span id="score-ties">0</span></div>
                    <div class="score-box">AI (O): <span id="score-ai">0</span></div>
                </div>
            </div>
        </header>

        <main>
            <div class="status-board">
                <div class="status-indicator">
                    <span id="player-status" class="active">Player (X)</span>
                    <span id="ai-status">AI (O)</span>
                </div>
                <div id="game-message">Your Turn!</div>
            </div>

            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <button id="restart-btn" class="restart-btn">Restart Game</button>
        </main>

        <footer>
            <p>Created by Gaurav Chaudhari</p>
        </footer>
    </div>

    <!-- Winning line overlay (dynamically positioned) -->
    <div id="winning-line"></div>

    <script src="script.js"></script>
</body>

</html>
